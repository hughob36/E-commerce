name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Esto le dice a TODO el trabajo que se ejecute dentro de esa carpeta
    defaults:
      run:
        working-directory: ./e_commerce

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Compilar y empaquetar
        run: mvn -B clean -DskipTests=false clean verify