name: Release on tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build JAR
        # Entramos a la carpeta para compilar
        run: mvn -B -DskipTests=false clean package
        working-directory: ./e_commerce

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Ecommerce ${{ github.ref_name }}"
          body: "Release generado automáticamente. Incluye el artefacto ejecutable .jar"
          # Apuntamos a la ruta exacta donde Maven deja el JAR
          files: ./e_commerce/target/*.jar
          draft: false
          prerelease: false