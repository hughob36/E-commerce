#configuraciones de H2
# === Datasource H2 en memoria solo para tests ===
spring.datasource.url=jdbc:h2:mem:vetdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=user
spring.datasource.password=

# === JPA / Hibernate ===
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
# Logging de pruebas mas limpio
logging.level.org.springframework.test=INFO

# JWT configuracion para Tests
security.jwt.private.key=${PRIVATE_KEY:mi_clave_secreta_de_prueba_12345678}
security.jwt.user.generator=${USER_GENERATOR:test_user_generator}